<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Reader</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <a href="#content" class="skip-link">Skip to content</a>
    <div id="auth-view" class="auth-view">
        <button class="lang-toggle-btn btn-link" type="button"></button>
        <main class="auth-card">
            <h1 class="auth-title">RSS Reader</h1>
            <p class="auth-subtitle">Sign in or create an account</p>
            <form id="auth-form" class="auth-form">
                <div class="auth-fields" id="auth-fields">
                    <label for="auth-email" class="visually-hidden">Email</label>
                    <input id="auth-email" type="email" class="input" placeholder="Email" required autocomplete="email">
                    <label for="auth-password" class="visually-hidden">Password</label>
                    <input id="auth-password" type="password" class="input" placeholder="Password" required autocomplete="current-password">
                </div>
                <div id="auth-error" class="auth-error hidden" role="alert"></div>
                <div id="auth-message" class="auth-message hidden" role="status"></div>
                <button id="auth-submit" type="submit" class="btn btn-primary auth-submit">Sign In</button>
                <p class="auth-toggle">
                    <button id="auth-toggle-btn" type="button" class="btn-link">Create an account</button>
                </p>
                <p class="auth-toggle">
                    <button id="guest-btn" type="button" class="btn-link">Continue without signing in</button>
                </p>
                <p class="auth-toggle" id="resend-section" style="display:none;">
                    <button id="resend-verification-btn" type="button" class="btn-link">Resend verification email</button>
                </p>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <button class="lang-toggle-btn btn-link" type="button"></button>
        <div class="app">
            <header class="header">
                <h1 class="header-title">RSS Reader</h1>
                <div class="header-actions">
                    <span id="current-user" class="current-user"></span>
                    <button id="signout-btn" class="btn btn-secondary">Sign Out</button>
                    <button id="refresh-all-btn" class="btn btn-secondary" title="Refresh all feeds">Refresh All</button>
                    <button id="new-post-header-btn" class="btn btn-primary hidden">New Post</button>
                    <button id="discover-btn" class="btn btn-discover">&#10022; Discover</button>
                    <button id="add-feed-btn" class="btn btn-primary">Add Feed</button>
                </div>
            </header>

            <div id="add-feed-form" class="add-feed-form hidden">
                <form id="feed-form">
                    <label for="feed-url" class="visually-hidden">Feed URL</label>
                    <input type="url" id="feed-url" class="input" placeholder="https://example.com/rss" required>
                    <button type="submit" class="btn btn-primary">Subscribe</button>
                    <button type="button" id="cancel-add-btn" class="btn btn-secondary">Cancel</button>
                </form>
            </div>

            <div class="layout">
                <aside class="feed-bar" id="sidebar">
                    <ul id="feed-list" class="feed-list"></ul>
                </aside>

                <main class="content" id="content">
                    <div id="loading" class="loading">Loading articles...</div>
                    <div id="error" class="error hidden" role="alert"></div>
                    <div id="daily-digest" class="daily-digest hidden">
                        <div class="digest-header">Today's Digest</div>
                        <div class="digest-content"></div>
                    </div>
                    <div id="summarize-banner" class="summarize-banner hidden">
                        <span class="summarize-banner-text"></span>
                        <button id="summarize-today-btn" class="btn btn-primary">Summarize Today</button>
                    </div>
                    <div id="empty" class="empty hidden">
                        <p>No feeds subscribed yet.</p>
                        <p>Click "Add Feed" to get started.</p>
                    </div>
                    <div id="posts-view" class="posts-view hidden">
                        <div class="posts-header">
                            <h2 class="posts-title"></h2>
                            <button id="new-post-btn" class="btn btn-primary"></button>
                        </div>
                        <div id="feed-url-section" class="feed-url-section hidden">
                            <span class="feed-url-label"></span>
                            <div class="feed-url-row">
                                <input id="feed-url-display" class="input feed-url-input" readonly>
                                <button id="copy-feed-url-btn" class="btn btn-secondary"></button>
                            </div>
                        </div>
                        <div id="post-editor" class="post-editor hidden">
                            <form id="post-form">
                                <input type="text" id="post-title" class="input post-input" placeholder="" required>
                                <textarea id="post-content" class="input post-textarea" placeholder="" rows="6"></textarea>
                                <div class="post-form-actions">
                                    <button type="submit" class="btn btn-primary"></button>
                                    <button type="button" id="cancel-post-btn" class="btn btn-secondary"></button>
                                </div>
                            </form>
                        </div>
                        <div id="post-list" class="post-list"></div>
                        <div id="post-empty" class="empty hidden"></div>
                    </div>
                    <div id="article-list" class="article-list"></div>
                    <div id="pagination" class="pagination hidden">
                        <button id="prev-page-btn" class="btn btn-page" disabled>Prev</button>
                        <span id="page-info" class="page-info"></span>
                        <button id="next-page-btn" class="btn btn-page" disabled>Next</button>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <div id="discover-overlay" class="discover-overlay hidden">
        <div class="discover-panel">
            <div class="discover-panel-header">
                <h2 class="discover-panel-title"></h2>
                <button id="discover-close" class="btn-link discover-close">&times;</button>
            </div>
            <div id="discover-content" class="discover-content"></div>
        </div>
    </div>

    <template id="feed-item-template">
        <li class="feed-item">
            <span class="feed-item-title"></span>
            <span class="feed-item-count"></span>
            <button class="feed-item-refresh" title="Refresh feed"></button>
            <button class="feed-item-remove" title="Remove feed"></button>
        </li>
    </template>

    <template id="post-item-template">
        <div class="post-item">
            <div class="post-item-header">
                <h3 class="post-item-title"></h3>
                <span class="post-item-date"></span>
            </div>
            <div class="post-item-content"></div>
            <div class="post-item-actions">
                <button class="post-edit-btn btn btn-secondary"></button>
                <button class="post-delete-btn btn btn-secondary"></button>
            </div>
        </div>
    </template>

    <template id="article-card-template">
        <article class="article-card">
            <div class="article-header">
                <button class="bookmark-btn" title="Bookmark">☆</button>
                <span class="article-feed-badge"></span>
                <span class="article-date"></span>
            </div>
            <h2 class="article-title"><a class="article-title-link" target="_blank" rel="noopener noreferrer"></a></h2>
            <audio class="article-audio hidden" controls preload="none"></audio>
            <p class="article-summary"></p>
        </article>
    </template>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
